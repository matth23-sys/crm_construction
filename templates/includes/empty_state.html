<div class="crm-empty-state">
    <h2 class="crm-empty-state__title">{{ title|default:"No records found" }}</h2>

    {% if description %}
        <p class="crm-empty-state__text">{{ description }}</p>
    {% endif %}

    {% if action_url and action_label %}
        <div class="crm-empty-state__actions">
            <a class="crm-btn crm-btn--primary" href="{{ action_url }}">
                {{ action_label }}
            </a>
        </div>
    {% endif %}
</div>
