{% if is_paginated %}
    <nav class="crm-pagination" aria-label="Pagination">
        {% if page_obj.has_previous %}
            <a class="crm-pagination__link" href="?page={{ page_obj.previous_page_number }}">Previous</a>
        {% endif %}

        <span class="crm-pagination__current">
            Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
        </span>

        {% if page_obj.has_next %}
            <a class="crm-pagination__link" href="?page={{ page_obj.next_page_number }}">Next</a>
        {% endif %}
    </nav>
{% endif %}
