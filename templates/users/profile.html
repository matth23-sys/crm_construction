{% extends "base.html" %}
{% block content %}
  <h1>Mi perfil</h1>

  <p><strong>Usuario:</strong> {{ request.user.username }}</p>
  <p><strong>Roles:</strong>
    {% for group in request.user.groups.all %}
      {{ group.name }}{% if not forloop.last %}, {% endif %}
    {% empty %}
      Sin roles asignados
    {% endfor %}
  </p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar cambios</button>
  </form>
{% endblock %}
