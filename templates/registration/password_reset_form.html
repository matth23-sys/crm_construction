{% extends "base.html" %}
{% block content %}
  <h1>Recuperar acceso</h1>
  <p>Ingresa tu correo registrado y te enviaremos un enlace para restablecer tu contraseña.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Enviar enlace</button>
  </form>
{% endblock %}
