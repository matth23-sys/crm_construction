{% extends "base.html" %}
{% block content %}
  <h1>Restablecer contraseña</h1>

  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Guardar nueva contraseña</button>
    </form>
  {% else %}
    <p>El enlace ya no es válido. Solicita uno nuevo.</p>
    <p><a href="{% url 'password_reset' %}">Solicitar nuevo enlace</a></p>
  {% endif %}
{% endblock %}
