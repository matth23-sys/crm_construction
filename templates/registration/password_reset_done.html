{% extends "base.html" %}

{% block title %}Reset Email Sent | CRM Construction{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<div class="crm-login-shell">
    <section class="crm-auth-card">
        <div class="crm-auth-card__brand">
            <span class="crm-brand__mark">CRM</span>
            <div>
                <h1>Check Your Email</h1>
                <p>If an account exists with that email, you will receive password reset instructions shortly.</p>
            </div>
        </div>

        <div class="crm-actions">
            <a href="{% url 'login' %}" class="crm-btn crm-btn--primary crm-btn--full">
                Back to Login
            </a>
        </div>
    </section>
</div>
{% endblock %}
