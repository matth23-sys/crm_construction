{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
  <h1>{{ page_title }}</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{{ submit_label }}</button>
    <a href="{% url 'clients:list' %}">Cancelar</a>
  </form>
{% endblock %}
